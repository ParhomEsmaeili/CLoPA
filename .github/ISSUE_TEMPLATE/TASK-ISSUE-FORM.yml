name: Task
description: Raise a non-code task
title: "[Task]: "
# type: Task
projects: ["5"]
body:
  - type: input
    id: short-description
    attributes:
      label: Description
      placeholder: ex. We need to deploy the repository for the submission. 
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What are one or more acceptance criteria that would be used to verify this task is completed?
      placeholder: ex. The repository and all relevant files are packaged together and submitted.
    validations:
      required: true
  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Are there any prerequisites for completing this task?
      placeholder: ex. Cloud service for saving model checkpoints/hugging face. 
    validations:
      required: false
  - type: textarea
    id: blockers
    attributes:
      label: Known or potential blockers
      description: Are there any known or potential blockers to completing this task?
      placeholder: ex. N/A
    validations:
      required: false
  - type: checkboxes
    id: project-admin
    attributes:
      label: Assign the relevant label(s) and, if known, Milestone to this task
      options:
        - label: I confirm I have assigned the relevant label(s) and, if known, Milestone to this task
          required: true
