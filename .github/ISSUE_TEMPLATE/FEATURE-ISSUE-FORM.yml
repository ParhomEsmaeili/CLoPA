name: Feature
description: Raise a feature request
title: "[Feature]: "
labels: ["enhancement"]
# type: Feature
projects: ["5"]
body:
  - type: input
    id: short-description
    attributes:
      label: Description
      placeholder: ex. The algorithm needs to be capable of transitioning between the few-shot and many-shot regimes for automated segmentation.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What are one or more acceptance criteria that would be used to verify this feature is working as expected?
      placeholder: ex. The algorithm has demonstrated the capability to transition to automated segmentation across a variety of permutations in the data samples (i.e. robustness)
    validations:
      required: true
  - type: textarea
    id: technical-considerations
    attributes:
      label: Technical considerations
      description: Are there any technical considerations for this feature?
      placeholder: ex. This feature will require a meta-algorithm which can adapt to the underlying segmentation task type and data fingerprints.
    validations:
      required: false
  - type: checkboxes
    id: project-admin
    attributes:
      label: Assign the relevant label(s) and, if known, Milestone to this feature request
      options:
        - label: I confirm I have assigned the relevant label(s) and, if known, Milestone to this feature request
          required: true
